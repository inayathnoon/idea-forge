name: Validate Harness

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run pipeline integrity tests
        run: bash tests/test_pipeline_integrity.sh
        continue-on-error: false

      - name: Run agent frontmatter validation
        run: bash tests/test_agent_frontmatter.sh
        continue-on-error: false

      - name: Run skill frontmatter validation
        run: bash tests/test_skill_frontmatter.sh
        continue-on-error: false

      - name: Run state machine tests
        run: bash tests/test_state_transitions.sh
        continue-on-error: false

      - name: Validate JSON schemas
        run: |
          echo "Validating harness/pipeline.json..."
          jq empty harness/pipeline.json

          echo "Validating harness/registry.json..."
          jq empty harness/registry.json

          echo "Validating memory/ideas_store.schema.json..."
          jq empty memory/ideas_store.schema.json

          echo "Validating memory/pipeline_log.json..."
          jq empty memory/pipeline_log.json

          echo "Validating memory/snapshot_manifest.json..."
          jq empty memory/snapshot_manifest.json

          echo "Validating memory/consistency_report.json..."
          jq empty memory/consistency_report.json

      - name: Check required files exist
        run: |
          files=(
            "harness/pipeline.json"
            "harness/registry.json"
            "harness/prompts/user-context.md"
            "harness/prompts/pipeline-overview.md"
            "specs/PRD.spec.md"
            "specs/ARCHITECTURE.spec.md"
            "specs/BUILD_PLAN.spec.md"
            "specs/pipeline.spec.md"
            "memory/pipeline_log.json"
            "memory/snapshot_manifest.json"
            "memory/consistency_report.json"
            "memory/playbook.md"
            "Makefile"
          )

          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done

          echo "✅ All required files present"

      - name: Check agents directory
        run: |
          agent_count=$(ls agents/*.md | wc -l)
          if [ "$agent_count" -lt 9 ]; then
            echo "❌ Expected at least 9 agents, found $agent_count"
            exit 1
          fi
          echo "✅ Found $agent_count agents"

      - name: Check skills directory
        run: |
          skill_count=$(find skills -name "SKILL.md" | wc -l)
          if [ "$skill_count" -lt 12 ]; then
            echo "❌ Expected at least 12 skills, found $skill_count"
            exit 1
          fi
          echo "✅ Found $skill_count skills"

      - name: Summary
        if: always()
        run: |
          echo "================================================"
          echo "Harness Validation Complete ✅"
          echo "================================================"
          echo ""
          echo "Tests run:"
          echo "  • Pipeline integrity tests"
          echo "  • Agent frontmatter validation"
          echo "  • Skill frontmatter validation"
          echo "  • State machine tests"
          echo "  • JSON schema validation"
          echo "  • File existence checks"
          echo "  • Component count checks"
          echo ""
          echo "For local testing, run: make test"
